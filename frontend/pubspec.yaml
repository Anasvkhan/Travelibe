name: travelibe_frontend
description: "Production Cross-Platform Flutter Mobile Client for Travelibe"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  go_router: ^13.2.0
  dio: ^5.4.1
  socket_io_client: ^3.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
